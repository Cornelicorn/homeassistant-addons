root            /dev/null;
server_name     $hostname;

client_max_body_size 512m;

add_header X-Content-Type-Options nosniff;
# Explicitly forbid loading any scripts (e.g. the GoatCounter analytics
# snippet in the upstream docs); mirrors the app's own CSP otherwise.
add_header Content-Security-Policy "default-src 'none'; style-src 'self' 'unsafe-inline'; img-src https:; script-src 'none'" always;
add_header X-XSS-Protection "1; mode=block";
add_header X-Robots-Tag none;
add_header 'Cache-Control' 'no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0';
expires off;
