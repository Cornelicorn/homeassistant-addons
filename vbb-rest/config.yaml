# https://developers.home-assistant.io/docs/add-ons/configuration#add-on-config
name: "VBB REST API"
description: "An HTTP REST API for Berlin & Brandenburg (VBB) public transport."
url: "https://github.com/Cornelicorn/homeassistant-addons/tree/main/vbb-rest"
version: "1.0.3"
slug: vbb-rest
init: false
panel_icon: mdi:train
image: "ghcr.io/cornelicorn/homeassistant-addon-vbb-rest"
arch:
  - aarch64
  - amd64
map:
  - type: ssl
ports:
  "80/tcp": 3000
ports_description:
  80/tcp: HTTP REST API / documentation
webui: "[PROTO:ssl]://[HOST]:[PORT:80]"

options:
  ssl: true
  certfile: fullchain.pem
  keyfile: privkey.pem

schema:
  ssl: bool
  certfile: str
  keyfile: str
  hostname: str?
